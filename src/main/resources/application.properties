spring.application.name=pharmacy-mgmt

server.servlet.context-path=/pharmacy-1.0
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacy_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Testdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT settings (change secret in production)
jwt.secret=ChangeThisSecretKeyShouldBeLongEnoughForHS256
jwt.expiration-ms=18000000

# HikariCP connection pool settings
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PharmacyHikariCP

# Logging (configurable path)
# Set `app.logging.path` to change where daily log files are written
app.logging.path=logs
