spring.application.name=pharmacy-mgmt

server.servlet.context-path=/pharmacy-1.0
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacy_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Testdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT settings (change secret in production)
jwt.secret=ChangeThisSecretKeyShouldBeLongEnoughForHS256
jwt.expiration-ms=18000000

# HikariCP connection pool settings
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PharmacyHikariCP

# Logging (configurable path)
# Set `app.logging.path` to change where daily log files are written
# Use forward slashes for Windows paths to avoid escaping issues
app.logging.path=F:/Collins/MyWork/amaksolutions/CMS/Server/pharmacy-app-logs

# Sales validation
sales.validation.allowed-gst-slabs=0,5,12,18,28
sales.validation.max-discount-percent=5
sales.validation.amount-tolerance=0.01
sales.validation.default-price-includes-gst=true

# Invoice PDF generation
# Configure this to an existing base/template PDF path. If not configured, system generates a clean A4 invoice.
sales.invoice.template-path=
# Daily archives will be created under this root as yyyy-MM-dd folders.
sales.invoice.output-root=F:/Collins/MyWork/amaksolutions/CMS/Server/bills
sales.invoice.render-static-on-template=false
sales.invoice.pharmacy.name=M/S MANISH PHARMACY
sales.invoice.pharmacy.address-line1=H NO 9-1-274/1/1F-5A, FIRST FLOOR
sales.invoice.pharmacy.address-line2=BAZAR SANGEET ROAD SECUNDERABAD
sales.invoice.pharmacy.phone=9666027727
sales.invoice.pharmacy.email=reddy.pothula@gmail.com
sales.invoice.pharmacy.gstin=36FLJPB8033H1Z3
sales.invoice.pharmacy.dl-no=TG/HYD/2024-122590
sales.invoice.default-patient-address=-
sales.invoice.default-doctor-name=-
